<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collections | The VA Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
      /* Prevent Flash of Unstyled Content (FOUC) during page transitions */
      html { background-color: #1C1C1C; }
      #preloader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #1C1C1C; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>

  </head>
  <body class="bg-[#EFECE8] text-[#1C1C1C] font-sans overflow-hidden cursor-none selection:bg-[#1C1C1C] selection:text-[#EFECE8]">
    
    <!-- Reused Cursor & Preloader -->
    <div id="cursor" class="hidden md:flex fixed top-0 left-0 w-3 h-3 bg-[#1C1C1C] rounded-full pointer-events-none z-[9999] -translate-x-1/2 -translate-y-1/2 transition-[width,height,background-color] duration-300 ease-out justify-center items-center text-white text-[10px] uppercase tracking-widest font-medium text-opacity-0"></div>

    <div id="preloader" class="fixed inset-0 z-[100] bg-[#1C1C1C] text-[#EFECE8] flex flex-col justify-center items-center">
        <div class="overflow-hidden">
            <h1 class="loader-text font-serif text-5xl md:text-7xl font-light tracking-widest uppercase translate-y-full">Collections</h1>
        </div>
    </div>

    <!-- Navigation -->
    <nav id="nav" class="fixed w-full flex justify-between items-center px-6 md:px-12 py-8 z-50 opacity-0 mix-blend-difference text-white">
        <a href="/" class="hover-target transition-link font-serif text-xl md:text-2xl font-medium tracking-widest uppercase">The VA Store</a>
        <div class="hidden md:flex gap-12 text-xs uppercase tracking-[0.2em] font-medium">
            <a href="/collections.html" class="hover-target transition-link">Collections</a>
            <span class="hover-target">Bespoke</span>
            <span class="hover-target">Cart (0) €</span>
        </div>
    </nav>

    <!-- Smooth Scroll Wrapper -->
    <div id="smooth-wrapper" class="w-full min-h-screen">
        <div id="smooth-content" class="pt-40 md:pt-56 pb-24 px-6 md:px-12 max-w-[1800px] mx-auto">
            
            <!-- Page Header -->
            <div class="mb-24 md:mb-40 flex flex-col md:flex-row justify-between items-end border-b border-[#1C1C1C]/20 pb-12">
                <div class="overflow-hidden"><h1 class="hero-title font-serif text-6xl md:text-9xl font-light leading-none tracking-tighter uppercase translate-y-full">Archive</h1></div>
                <p class="hero-sub max-w-sm text-sm md:text-base font-light tracking-wide text-gray-600 leading-relaxed opacity-0 mt-8 md:mt-0">Explore our curated archive of bespoke macramé, designed to bring structural elegance to the modern wardrobe.</p>
            </div>

            <!-- Editorial Gallery Grid -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-x-8 gap-y-24 md:gap-y-40">
                
                <!-- Product 1 -->
                <div class="md:col-span-5 flex flex-col gap-6">
                    <div class="w-full aspect-[3/4] overflow-hidden rounded-sm view-img group hover-target" data-cursor-text="Shop €450">
                        <img class="w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-105" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1500&auto=format&fit=crop" alt="Collection 1">
                    </div>
                    <div class="flex justify-between items-center text-sm uppercase tracking-widest font-medium"><p>Aura Vest</p><p>€450</p></div>
                </div>

                <!-- Product 2 (Pushed Down for asymmetry) -->
                <div class="md:col-span-6 md:col-start-7 md:mt-40 flex flex-col gap-6">
                    <div class="w-full aspect-[4/5] overflow-hidden rounded-sm view-img group hover-target" data-cursor-text="Shop €620">
                        <img class="w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-105" src="https://images.unsplash.com/photo-1550614000-4b95d4ed8bd9?q=80&w=1500&auto=format&fit=crop" alt="Collection 2">
                    </div>
                    <div class="flex justify-between items-center text-sm uppercase tracking-widest font-medium"><p>Ethereal Gown</p><p>€620</p></div>
                </div>

                <!-- Product 3 -->
                <div class="md:col-span-8 md:col-start-3 flex flex-col gap-6">
                    <div class="w-full aspect-[16/9] overflow-hidden rounded-sm view-img group hover-target" data-cursor-text="Shop €380">
                        <img class="w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-105" src="https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=2000&auto=format&fit=crop" alt="Collection 3">
                    </div>
                    <div class="flex justify-between items-center text-sm uppercase tracking-widest font-medium"><p>Lumina Top</p><p>€380</p></div>
                </div>

            </div>

        </div>
    </div>

    <!-- Load Main Engine -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
